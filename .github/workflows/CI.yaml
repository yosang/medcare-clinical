name: .NET CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Backend

    steps:
      - uses: actions/checkout/v4

      - uses: actions/setup-dotnet@v4
        with: 
          dotnet-version: 9.0.x
      
      - run: dotnet build